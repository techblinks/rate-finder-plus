name: RBA Rate Announcement Publisher

on:
  schedule:
    - cron: '30 4 * * 2'
  workflow_dispatch:

jobs:
  publish-rba-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check RBA rate
        id: check_rba
        run: |
          RBA_HTML=$(curl -s "https://www.rba.gov.au/statistics/cash-rate/" -H "User-Agent: CalcyBot/1.0")
          RATE=$(echo "$RBA_HTML" | grep -oP '[\d.]+(?=%\s*p\.a)' | head -1)
          if [ -z "$RATE" ]; then RATE="4.35"; fi
          echo "rate=$RATE" >> $GITHUB_OUTPUT
          echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "month=$(date +%B)" >> $GITHUB_OUTPUT
          echo "year=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "Rate: $RATE%"

      - name: Generate article with Claude
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          RATE="${{ steps.check_rba.outputs.rate }}"
          MONTH="${{ steps.check_rba.outputs.month }}"
          YEAR="${{ steps.check_rba.outputs.year }}"

          python3 << EOF
          import json, urllib.request, os

          prompt = f"""Write a news article about the RBA cash rate for {MONTH} {YEAR}. Rate is {RATE}%.
          Write for Australian homeowners. Cover: the decision, mortgage repayment impact, fixed vs variable rates, homeowner advice.
          Return ONLY a JSON object with keys: title (string, max 80 chars), excerpt (string, max 200 chars), body (string, HTML paragraphs with <p> and <h2> tags).
          No markdown. No backticks. Pure JSON only."""

          payload = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 2000,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          text = data["content"][0]["text"].strip()

          # Strip markdown if present
          if text.startswith("```"):
              lines = text.split("\n")
              text = "\n".join(l for l in lines if not l.startswith("```"))

          article = json.loads(text)

          with open("/tmp/article.json", "w") as f:
              json.dump(article, f)

          print("Article generated:", article["title"])
          EOF

      - name: Publish to Calcy
        env:
          PUBLISH_SECRET: ${{ secrets.PUBLISH_SECRET }}
        run: |
          TODAY="${{ steps.check_rba.outputs.today }}"
          RATE="${{ steps.check_rba.outputs.rate }}"

          python3 << EOF
          import json, urllib.request, os

          with open("/tmp/article.json") as f:
              article = json.load(f)

          rate_slug = "${RATE}".replace(".", "-")
          slug = f"rba-{rate_slug}-${TODAY}"

          payload = json.dumps({
              "title": article["title"],
              "slug": slug,
              "excerpt": article["excerpt"],
              "body": article["body"],
              "published_at": "${TODAY}T04:30:00Z",
              "secret": os.environ["PUBLISH_SECRET"]
          }).encode()

          req = urllib.request.Request(
              "https://newvydpcchjbuhcldckf.supabase.co/functions/v1/publish-news",
              data=payload,
              headers={"Content-Type": "application/json"}
          )

          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())

          if result.get("success"):
              print("Article published! ID:", result.get("id"))
          else:
              print("Failed:", result)
              exit(1)
          EOF
