name: RBA Rate Announcement Publisher

on:
  schedule:
    - cron: '30 4 * * 2'
  workflow_dispatch:

jobs:
  publish-rba-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check RBA rate
        id: check_rba
        run: |
          RBA_HTML=$(curl -s "https://www.rba.gov.au/statistics/cash-rate/" -H "User-Agent: CalcyBot/1.0")
          RATE=$(echo "$RBA_HTML" | grep -oP '[\d.]+(?=%\s*p\.a)' | head -1)
          if [ -z "$RATE" ]; then RATE="4.35"; fi
          echo "rate=$RATE" >> $GITHUB_OUTPUT
          echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "month=$(date +%B)" >> $GITHUB_OUTPUT
          echo "year=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "Rate found: $RATE%"

      - name: Generate article with Claude
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RBA_RATE: ${{ steps.check_rba.outputs.rate }}
          RBA_MONTH: ${{ steps.check_rba.outputs.month }}
          RBA_YEAR: ${{ steps.check_rba.outputs.year }}
        run: |
          cat > /tmp/generate.py << 'PYEOF'
          import json, urllib.request, os, sys

          rate = os.environ["RBA_RATE"]
          month = os.environ["RBA_MONTH"]
          year = os.environ["RBA_YEAR"]
          api_key = os.environ["ANTHROPIC_API_KEY"]

          prompt = (
              f"Write a news article about the RBA cash rate decision for {month} {year}. "
              f"The cash rate is {rate}%. Write for Australian homeowners and buyers. "
              f"Cover: the RBA decision, mortgage repayment impact, fixed vs variable rates, advice. "
              f"Return ONLY a JSON object with these keys: "
              f"title (string max 80 chars), excerpt (string max 200 chars), body (HTML string with p and h2 tags). "
              f"Pure JSON only. No markdown. No backticks. No explanation."
          )

          payload = json.dumps({
              "model": "claude-haiku-4-5-20251001",
              "max_tokens": 2000,
              "messages": [{"role": "user", "content": prompt}]
          }).encode()

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload,
              headers={
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          try:
              with urllib.request.urlopen(req) as r:
                  data = json.loads(r.read())
          except urllib.error.HTTPError as e:
              print("API Error:", e.read().decode())
              sys.exit(1)

          text = data["content"][0]["text"].strip()

          # Strip markdown backticks if present
          if "```" in text:
              lines = text.split("\n")
              text = "\n".join(l for l in lines if not l.strip().startswith("```"))

          try:
              article = json.loads(text)
          except json.JSONDecodeError as e:
              print("JSON parse error:", e)
              print("Raw text:", text)
              sys.exit(1)

          with open("/tmp/article.json", "w") as f:
              json.dump(article, f)

          print("Generated:", article["title"])
          PYEOF
          python3 /tmp/generate.py

      - name: Publish to Calcy
        env:
          PUBLISH_SECRET: ${{ secrets.PUBLISH_SECRET }}
          RBA_TODAY: ${{ steps.check_rba.outputs.today }}
          RBA_RATE: ${{ steps.check_rba.outputs.rate }}
        run: |
          cat > /tmp/publish.py << 'PYEOF'
          import json, urllib.request, os, sys

          today = os.environ["RBA_TODAY"]
          rate = os.environ["RBA_RATE"]
          secret = os.environ["PUBLISH_SECRET"]

          with open("/tmp/article.json") as f:
              article = json.load(f)

          rate_slug = rate.replace(".", "-")
          slug = f"rba-{rate_slug}-{today}"

          payload = json.dumps({
              "title": article["title"],
              "slug": slug,
              "excerpt": article["excerpt"],
              "body": article["body"],
              "published_at": f"{today}T04:30:00Z",
              "secret": secret
          }).encode()

          req = urllib.request.Request(
              "https://newvydpcchjbuhcldckf.supabase.co/functions/v1/publish-news",
              data=payload,
              headers={"Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req) as r:
                  result = json.loads(r.read())
          except urllib.error.HTTPError as e:
              print("Publish error:", e.read().decode())
              sys.exit(1)

          if result.get("success"):
              print("Published! ID:", result.get("id"))
              print("Live at: https://calcy.com.au/news/" + slug)
          else:
              print("Failed:", result)
              sys.exit(1)
          PYEOF
          python3 /tmp/publish.py
